worker_processes auto;
events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    # Compressione - utile per ridurre il carico in caso di stress test
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    # Upstream verso backend Node.js
    upstream backend {
        server backend:3000;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        # Header utili per debugging dietro l'ALB di AWS
        add_header X-Instance $hostname always;

        client_max_body_size 5m;

        # Endpoint health per ALB target group
        location = /health {
            proxy_pass http://backend/health;
            access_log off;
        }

        # WebSocket per Socket.IO (notifiche in tempo reale alla centrale)
        location /socket.io/ {
            proxy_pass http://backend/socket.io/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 86400;
        }

        # Tutto il resto al backend (API + frontend statico)
        location / {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
