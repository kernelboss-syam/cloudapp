<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cloud Lab - Storia del corso</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/timeline.css">
</head>
<body>
  <div id="header-placeholder"></div>

  <main class="timeline-main">
    <div class="timeline-header">
      <h1><span class="course-name">Storia del corso</span></h1>
      <p class="course-range">Caricamento…</p>
    </div>

    <div class="timeline-container">
      <div class="timeline-track" id="timeline-track">
        <div class="timeline-line"></div>
      </div>
    </div>

    <p class="timeline-hint">💡 Passa il mouse (o tocca) un nodo per vedere le materie</p>

    <div class="timeline-legend">
      <div class="legend-item"><span class="legend-dot past"></span>Completato</div>
      <div class="legend-item"><span class="legend-dot current"></span>In corso</div>
      <div class="legend-item"><span class="legend-dot future"></span>Prossimi mesi</div>
    </div>
  </main>

  <script src="/js/auth.js"></script>
  <script src="/js/timeline.js"></script>
</body>
</html>
