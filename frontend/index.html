<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cloud Lab - Accedi</title>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-logo">CL</div>
      <h1>Cloud Lab</h1>
      <p class="subtitle">Accedi per visualizzare i servizi disponibili</p>

      <div id="login-error" class="alert alert-error" style="display:none;"></div>

      <form id="login-form">
        <div class="form-group">
          <label for="username">Nome utente</label>
          <input type="text" id="username" class="form-control" autocomplete="username" required autofocus>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" class="form-control" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Accedi</button>
      </form>

      <div class="demo-credentials">
        <h4>🔑 Credenziali demo</h4>
        <div style="margin-bottom:6px;">Centrale operativa: <code>admin</code> / <code>Admin123!</code></div>
        <div>Operatore mobile: <code>operatore1</code> / <code>Operatore123!</code></div>
      </div>
    </div>
  </div>

  <div class="aws-badge">
    <span class="dot"></span>
    <span>AWS Cloud</span>
  </div>

  <script src="/js/auth.js"></script>
  <script src="/js/login.js"></script>
</body>
</html>
