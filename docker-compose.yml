# Docker Compose - usato sia in locale che sulle istanze EC2
# Uso locale (EC2 standalone): docker compose up -d --build
# Uso produzione AWS con RDS: imposta DB_HOST=<rds-endpoint> nel .env e commenta il servizio db

services:

  # ============= POSTGRESQL LOCALE =============
  # Per produzione con RDS: commenta tutto questo blocco e imposta DB_HOST nel .env
  db:
    image: postgres:16-alpine
    container_name: cloudproject-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-Vmware1!}
      POSTGRES_DB: ${DB_NAME:-cloudproject}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-cloudproject}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============= BACKEND APP =============
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cloudproject-backend
    restart: unless-stopped
    environment:
      PORT: 3000
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-cloudproject}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-Vmware1!}
      DB_SSL: ${DB_SSL:-false}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-use-secrets-manager}
      INSTANCE_ID: ${INSTANCE_ID:-local}
    volumes:
      - ./frontend:/app/../frontend:ro
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "3000"

  # ============= NGINX REVERSE PROXY =============
  nginx:
    image: nginx:1.27-alpine
    container_name: cloudproject-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend

volumes:
  pgdata:
